services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinellm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/sentinellm
      REDIS_URL: redis://redis:6379/0
      HF_MODEL_REPO: ${HF_MODEL_REPO:-distilbert-base-uncased}
      ONNX_MODEL_PATH: /app/models/sentinellm.onnx
      LOG_LEVEL: INFO
    volumes:
      - ./models:/app/models:ro
    ports:
      - "8000:8000"

volumes:
  pgdata:
